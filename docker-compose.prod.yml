version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: novel_hub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: novel_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U novel_hub']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://novel_hub:${POSTGRES_PASSWORD:-secret}@postgres:5432/novel_hub
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      PORT: 4000
      NODE_ENV: production
      PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: /usr/bin/chromium
      SCRAPER_COOKIES_EMPIRENOVEL_COM: ${SCRAPER_COOKIES_EMPIRENOVEL_COM}
      SCRAPER_USER_AGENT: ${SCRAPER_USER_AGENT}

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      DATABASE_URL: postgres://novel_hub:${POSTGRES_PASSWORD:-secret}@postgres:5432/novel_hub
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: /usr/bin/chromium
      SCRAPER_COOKIES_EMPIRENOVEL_COM: ${SCRAPER_COOKIES_EMPIRENOVEL_COM}
      SCRAPER_USER_AGENT: ${SCRAPER_USER_AGENT}

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - '${WEB_PORT:-8080}:80'

volumes:
  postgres_data:
  redis_data:
